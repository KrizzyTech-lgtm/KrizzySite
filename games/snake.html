<!DOCTYPE html>
<html>

<head>

<title>Snake Game</title>

<style>

body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas{
    background:#111;
    margin-top:20px;
}

</style>

</head>

<body>

<h1>Snake Game</h1>

<canvas id="game" width="400" height="400"></canvas>

<script>

const canvas = document.getElementById("game");

const ctx = canvas.getContext("2d");

ctx.fillStyle = "lime";

ctx.fillRect(180,180,20,20);

</script>

</body>
</html>
